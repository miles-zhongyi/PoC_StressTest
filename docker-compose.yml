# 5G RU Digital Twin - capacity / load PoC
#   2-RU cluster (cell-1 @ -600m, cell-2 @ +600m) on a shared DU. UEs roam across
#   the midline and hand over to the stronger RU (A3 hysteresis, HO_MARGIN_DB).
#
#   docker compose up --build                      # 1 UE (NUM_UES=1)
#   NUM_UES=2000 docker compose up --build         # bash: 2000 UEs in ONE container
#   $env:NUM_UES=2000; docker compose up --build   # PowerShell (or: .\scripts\run_stress.ps1)
#   docker compose up --build --scale ue-sim=4     # 4 simulators across cores
#   curl http://localhost:9080/status              # live cell state (JSON)
#   (host 9080: container 8080 — avoids Windows reserved port 8080)
#   open http://localhost:9090                     # metrics dashboard
#   docker compose logs -f du                       # watch PRB utilisation
#
# Scale by raising NUM_UES (UEs are async tasks inside one process), NOT by
# spinning up thousands of containers. For more than one process can handle,
# add simulator replicas with --scale ue-sim=N.

services:
  du:
    build:
      context: .
      dockerfile: du/Dockerfile
    container_name: du
    restart: unless-stopped
    environment:
      TOTAL_PRBS: "273"        # 100 MHz @ 30 kHz SCS = 273 PRBs per cell
      SCS_KHZ: "30"
      MONITOR_INTERVAL: "5"
      TRAFFIC_PROFILE: "voip"  # 1–2 PRBs per voice session (see common/rf_model.py)
      RADIO_TECH: "lte"        # realistic LTE (RRC/S1AP) signalling; nr reserved for 5G
      LTE_TEMPLATES: "/trace/data/lte_templates.json"  # real message templates (optional; built-in defaults otherwise)
    volumes:
      - ./data:/trace/data:ro
    ports:
      - "9080:8080"   # 9080 on host: 8080 is often in Windows excludedportrange
    networks: [ran]

  # Two RUs form a small cluster, placed left/right of the origin so UEs roaming
  # across the midline trigger inter-RU handovers. Each RU is its own cell with
  # its own PRB pool on the shared DU.
  ru:
    build:
      context: .
      dockerfile: ru/Dockerfile
    container_name: ru
    restart: unless-stopped
    depends_on: [du]
    environment:
      DU_HOST: du
      DU_PORT: "38472"
      CELL_ID: cell-1
      FREQ_GHZ: "3.5"
      BANDWIDTH_MHZ: "100"
      TX_POWER_DBM: "49"
      TX_GAIN_DB: "15"
      RU_X: "-600"             # cluster geometry: cell-1 sits left of origin
      RU_Y: "0"
      RADIO_TECH: "lte"
      LTE_TEMPLATES: "/trace/data/lte_templates.json"
    volumes:
      - ./data:/trace/data:ro
    ulimits:                   # one socket per UE -> raise the fd limit
      nofile:
        soft: 65536
        hard: 65536
    networks: [ran]

  ru2:
    build:
      context: .
      dockerfile: ru/Dockerfile
    container_name: ru2
    restart: unless-stopped
    depends_on: [du]
    environment:
      DU_HOST: du
      DU_PORT: "38472"
      CELL_ID: cell-2
      FREQ_GHZ: "3.5"
      BANDWIDTH_MHZ: "100"
      TX_POWER_DBM: "49"
      TX_GAIN_DB: "15"
      RU_X: "600"             # cluster geometry: cell-2 sits right of origin
      RU_Y: "0"
      RADIO_TECH: "lte"
      LTE_TEMPLATES: "/trace/data/lte_templates.json"
    volumes:
      - ./data:/trace/data:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks: [ran]

  # The whole UE population lives here. Each UE is an async task, not a container.
  ue-sim:
    build:
      context: .
      dockerfile: ue/Dockerfile
    restart: unless-stopped
    depends_on: [ru, ru2]
    environment:
      # RU cluster the UEs can see + hand over between (positions must match the
      # RU_X/RU_Y above so the UE's RSRP estimate matches what the RU computes).
      RU_LIST: >-
        [{"name":"cell-1","host":"ru","port":38470,"x":-600,"y":0},
         {"name":"cell-2","host":"ru2","port":38470,"x":600,"y":0}]
      HO_MARGIN_DB: "3"         # A3 hysteresis: neighbour must beat serving by 3 dB
      RADIO_TECH: "lte"         # realistic LTE (RRC/S1AP) signalling; nr reserved for 5G
      LTE_TEMPLATES: "/trace/data/lte_templates.json"  # real templates (built by scripts/build_message_templates.py)
      RU_HOST: ru               # fallback if RU_LIST is unset
      RU_PORT: "38470"
      NUM_UES: "${NUM_UES:-1}"  # override: NUM_UES=2000 docker compose up
      UE_TARGET_STATE: "/trace/data/ue_target.json"  # survives ue-sim restart (dashboard scale)
      MAX_UES: "5000"           # ceiling for dashboard / POST /control
      UE_SPAWN_BATCH: "25"      # spawn UE tasks in batches (avoids connection_refused storms)
      UE_SPAWN_INTERVAL: "0.2"
      RAMP_SECONDS: "30"        # spread attach attempts across UEs (raise for 300+ UEs)
      TRAFFIC_PROFILE: "voip"   # voip | data (Mbps stress)
      # VoIP: DU assigns fixed 1–2 PRBs/session (not derived from demand)
      DEMAND_MIN_MBPS: "0.012"
      DEMAND_MAX_MBPS: "0.048"
      # Synthetic load by default. Trace replay: docker compose -f docker-compose.trace.yml up
      REPLAY_MODE: "0"
      TRACE_INDEX: "/trace/data/trace_index.jsonl"
      REPLAY_SPEED: "10"
      UE_TX_POWERS_DBM: "20,23,26"
      SPEED_MIN_MPS: "1"
      SPEED_MAX_MPS: "30"
      MAX_RADIUS_M: "1300"      # roam wide enough to cross both cells' coverage
      START_RADIUS_M: "500"
      SESSION_DURATION: "45"    # 0 = stay connected forever
      IDLE_BETWEEN: "5"
      STATS_INTERVAL: "5"
    volumes:
      - ./data:/trace/data
      - ./22_decoded:/trace/raw:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks: [ran]

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard
    restart: unless-stopped
    depends_on: [du, ue-sim]
    environment:
      DU_STATUS_URL: http://du:8080/status
      DU_TRACE_URL: http://du:8080/trace
      UE_STATUS_URL: http://ue-sim:8081/status
      UE_CONTROL_URL: http://ue-sim:8081/control
      UE_GEO_URL: http://ue-sim:8081/geo
      RECORD_ID_MESSAGES: /app/CallFlow/record-id-messages.txt
      TRACE_DECODED_DIR: /trace/raw
      TRACE_SAMPLES_CACHE: /trace/data/trace_message_samples.json
      DASHBOARD_PORT: "9090"
    volumes:
      - ./22_decoded:/trace/raw:ro
      - ./data:/trace/data
    ports:
      - "9090:9090"
    networks: [ran]

networks:
  ran:
    driver: bridge
